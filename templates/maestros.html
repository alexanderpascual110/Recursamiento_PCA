<!DOCTYPE html>
<html>
<head>
    <title>Maestros</title>
</head>

<body style="
background:#dfefff;
font-family:Arial;
margin:0;">

<div style="
background:#4f6bdc;
padding:20px;
text-align:center;
color:white;
font-size:35px;
font-weight:bold;">
🎓 Gestión de Maestros
</div>

<div style="
width:90%;
margin:auto;
margin-top:20px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0px 0px 15px lightgray;">

<a href="/">
<button style="
background:#5c6bc0;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;">
🏠 Inicio
</button>
</a>

<br><br>

<form action="/agregar_maestro" method="POST">

<input type="text" name="nombre"
placeholder="Nombre"
required
style="
padding:12px;
width:220px;
border-radius:10px;
border:1px solid lightgray;">

<input type="text" name="especialidad"
placeholder="Especialidad"
required
style="
padding:12px;
width:220px;
border-radius:10px;
border:1px solid lightgray;">

<input type="tel" name="telefono"
placeholder="Telefono"
pattern="[0-9]{10}"
maxlength="10"
title="Debe contener exactamente 10 digitos"
required
style="
padding:12px;
width:220px;
border-radius:10px;
border:1px solid lightgray;">

<input type="text" name="turno"
placeholder="Turno"
required
style="
padding:12px;
width:220px;
border-radius:10px;
border:1px solid lightgray;">

<input type="number" name="numero_de_empleado"
placeholder="Numero de empleado"
required
style="
padding:12px;
width:220px;
border-radius:10px;
border:1px solid lightgray;">

<button style="
background:#8ec5ff;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;">
Guardar
</button>

</form>

<br>

<table style="
width:100%;
border-collapse:collapse;">

<tr style="
background:#8ec5ff;">

<th style="padding:12px;">Nombre</th>
<th>Especialidad</th>
<th>Telefono</th>
<th>Turno</th>
<th>Numero de empleado</th>

</tr>

{% for a in datos %}

<tr style="text-align:center;">

<td style="padding:10px;">{{a.nombre}}</td>
<td>{{a.especialidad}}</td>
<td>{{a.telefono}}</td>
<td>{{a.turno}}</td>
<td>{{a.numero_de_empleado}}</td>

<td>

<a href="/editar_maestro/{{a._id}}">
<button style="
background:#4caf50;
color:white;
border:none;
padding:8px;
border-radius:8px;">
Editar
</button>
</a>

<a href="/eliminar_maestro/{{a._id}}">
<button style="
background:#f44336;
color:white;
border:none;
padding:8px;
border-radius:8px;">
Eliminar
</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
